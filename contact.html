<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contatti — Atto</title>
<meta name="description" content="Raccontaci il progetto: rispondiamo entro un giorno lavorativo, nella tua lingua." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..620;1,9..144,400..620&family=Geist:wght@400..700&display=swap" rel="stylesheet" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-in">
    <a class="back-home" href="index.html"><span aria-hidden="true">←</span>&nbsp;<span data-i18n="nav.backhome">Torna alla home</span></a>
    <div class="header-tools">
      <div class="lang-switch" aria-label="Lingua">
        <button data-lang="it">IT</button><span class="sep">·</span>
        <button data-lang="en">EN</button><span class="sep">·</span>
        <button data-lang="de">DE</button><span class="sep">·</span>
        <button data-lang="fr">FR</button>
      </div>
    </div>
  </div>
</header>

<main>

  <section class="page-hero">
    <div class="container">
      <p class="kicker" data-i18n="contact.tag">Contatti</p>
      <h1 data-i18n="contact.title">Raccontaci il progetto.</h1>
      <p class="lede" data-i18n="contact.sub">Rispondiamo in fretta, nella tua lingua.</p>
    </div>
  </section>

  <section class="section">
    <div class="container" style="max-width:760px;">
      <form data-contact-form action="https://formspree.io/f/[FORMSPREE_FORM_ID]" method="POST">
        <div class="form-grid">
          <div class="field">
            <label for="f-name" data-i18n="form.name">Nome e cognome</label>
            <input id="f-name" name="name" type="text" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="f-email" data-i18n="form.email">Email</label>
            <input id="f-email" name="email" type="email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="f-phone" data-i18n="form.phone">Telefono</label>
            <input id="f-phone" name="phone" type="tel" autocomplete="tel" />
          </div>
          <div class="field">
            <label for="f-role" data-i18n="form.role">Chi sei? (azienda, privato, ente…)</label>
            <select id="f-role" name="role">
              <option value="azienda" data-i18n="form.role.company">Azienda</option>
              <option value="privato" data-i18n="form.role.private">Privato / libero professionista</option>
              <option value="ente" data-i18n="form.role.institution">Ente / istituzione</option>
              <option value="atleta" data-i18n="form.role.athlete">Atleta / team sportivo</option>
              <option value="artista" data-i18n="form.role.artist">Artista / musicista</option>
              <option value="altro" data-i18n="form.role.other">Altro</option>
            </select>
          </div>
          <div class="field full">
            <label for="f-company" data-i18n="form.company">Azienda / progetto</label>
            <input id="f-company" name="company" type="text" autocomplete="organization" />
          </div>
          <div class="field full">
            <label for="f-message" data-i18n="form.message">Note sul progetto</label>
            <textarea id="f-message" name="message" required></textarea>
          </div>
          <div class="field full form-consent">
            <input id="f-privacy" type="checkbox" required />
            <label for="f-privacy" data-i18n="form.privacy" style="text-transform:none;letter-spacing:0;font-size:.8rem;">Accetto la privacy policy.</label>
          </div>
        </div>
        <input type="hidden" name="_subject" value="Contatto dal sito — Atto" />
        <input type="hidden" name="lang" value="it" data-hidden-lang />
        <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
        <p style="margin-top:1.4rem;">
          <button class="btn btn-pine" type="submit" data-i18n="form.submit">Invia richiesta</button>
        </p>
        <p class="form-status" data-form-status aria-live="polite"></p>
      </form>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="footer-back">
    <div class="container">
      <a class="back-home" href="index.html"><span aria-hidden="true">←</span>&nbsp;<span data-i18n="nav.backhome">Torna alla home</span></a>
    </div>
  </div>
  <div class="footer-base">
    <div class="container">
      <span>© <span data-year>2026</span> Atto — <span data-i18n="foot.rights">Tutti i diritti riservati.</span></span>
      <span>Lugano &amp; Zürich</span>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="app.js"></script>
<script>
(function () {
  var form = document.querySelector("[data-contact-form]");
  var status = document.querySelector("[data-form-status]");
  var I = window.ATTO_I18N;
  if (!form) return;
  var langField = form.querySelector("[data-hidden-lang]");
  form.addEventListener("submit", function (ev) {
    ev.preventDefault();
    if (langField && I) langField.value = I.getLang();
    if (status) { status.textContent = "…"; status.className = "form-status"; }
    fetch(form.action, { method: "POST", body: new FormData(form), headers: { Accept: "application/json" } })
      .then(function (res) {
        if (res.ok) {
          if (status) { status.textContent = I ? I.t("form.success") : "Inviato."; status.className = "form-status ok"; }
          form.reset();
        } else { throw new Error("send failed"); }
      })
      .catch(function () {
        if (status) { status.textContent = I ? I.t("form.error") : "Errore."; status.className = "form-status err"; }
      });
  });
})();
</script>
</body>
</html>
