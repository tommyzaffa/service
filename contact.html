<div class="veil"></div>

<div class="overlay" id="overlay" aria-hidden="true">
  <button class="overlay__close" id="menuClose" type="button" aria-label="Chiudi menu"></button>
  <nav class="overlay__nav">
    <a href="index.html" data-hot><span><i class="overlay__num">01</i><span data-i18n="cc.nav.home">Home</span></span></a>

</div>

<div class="wrap">
  <header class="bar">
    <a href="index.html" class="brand">atto<i></i></a>
    <div class="bar__right">
      <div class="bar__lang" role="group" aria-label="Language">
        <button type="button" data-lang="it">IT</button><button type="button" data-lang="en">EN</button><button type="button" data-lang="de">DE</button><button type="button" data-lang="fr">FR</button>
      </div>
      <a class="bar__cta" href="start.html" data-hot><span data-i18n="nav.start">Inizia</span></a>
      <button class="menu-btn" id="menuBtn" data-hot aria-label="Apri menu" aria-controls="overlay" aria-expanded="false"><span></span><span></span></button>
    </div>
  </header>

  <section class="phero" style="min-height:auto;padding-bottom:30px">
    <p class="phero__tag"><span data-i18n="cc.contact.tag">Mettiti in contatto</span></p>
    <h1 class="phero__title" data-i18n-html="cc.contact.title"></h1>
    <p class="phero__sub" data-i18n="cc.contact.sub"></p>
  </section>

  <section class="cwrap">
    <form class="cform" id="contactForm" action="https://formspree.io/f/[FORMSPREE_FORM_ID]" method="POST" novalidate>
      <div class="field-row">
        <div class="field">
          <label for="f-name" data-i18n="form.name">Nome completo</label>
          <input id="f-name" name="name" type="text" autocomplete="name" />
        </div>
        <div class="field">
          <label for="f-email" data-i18n="form.email">Email</label>
          <input id="f-email" name="email" type="email" autocomplete="email" required />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="f-phone" data-i18n="form.phone">Telefono</label>
          <input id="f-phone" name="phone" type="tel" autocomplete="tel" />
        </div>
        <div class="field">
          <label for="f-company" data-i18n="form.company">Azienda / progetto</label>
          <input id="f-company" name="company" type="text" autocomplete="organization" />
        </div>
      </div>
      <div class="field">
        <label for="f-message" data-i18n="form.message">Raccontaci di più</label>
        <textarea id="f-message" name="message"></textarea>
      </div>
      <div class="field">
        <label for="f-lang" data-i18n="form.langpref">Lingua preferita</label>
        <select id="f-lang" name="preferred_language">
          <option value="Italiano">Italiano</option>
          <option value="English">English</option>
          <option value="Deutsch">Deutsch</option>
          <option value="Français">Français</option>
        </select>
      </div>
      <input type="hidden" name="_subject" value="New message from Atto site" />
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px" aria-hidden="true" />
      <label class="check">
        <input type="checkbox" id="f-privacy" name="privacy_consent" value="yes" required />
        <span data-i18n="form.privacy">Accetto la privacy policy.</span>
      </label>
      <button class="btn btn--fill" type="submit" id="formSubmit"><span data-i18n="form.submit">Invia richiesta</span></button>
      <div class="form-status" id="formStatus" role="status"></div>
    </form>

    <aside class="caside">
      <h3 data-i18n="nav.contact">Contatti</h3>
      <a class="cinfo__row" href="mailto:hello@atto.studio">
        <span class="cinfo__label">Email</span>
        <span class="cinfo__value">hello@atto.studio</span>
      </a>
      <div class="cinfo__row">
        <span class="cinfo__label" data-i18n="nav.language">Lingua</span>
        <span class="cinfo__value">IT · EN · DE · FR</span>
      </div>
      <div class="cinfo__row">
        <span class="cinfo__label">Studio</span>
        <span class="cinfo__value">Lugano · Zürich, CH</span>
      </div>
    </aside>
  </section>

  <footer class="foot">
    <span>© <span id="year"></span> Atto Studio</span>
    <span>Lugano · Zürich</span>
    <span>hello@atto.studio</span>
  </footer>
</div>

<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
